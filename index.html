<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Biblioteca Apócrifa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&family=Uncial+Antiqua&display=swap" rel="stylesheet">
<style>
:root {
  --parchment:   #F2E8D0;
  --parchment2:  #E8D9B5;
  --ink:         #1C1208;
  --ink2:        #2E1F08;
  --gold:        #B8860B;
  --gold-light:  #D4A843;
  --gold-bright: #F0C040;
  --rust:        #8B3A0F;
  --rust-light:  #B5562A;
  --dark-bg:     #0D0904;
  --dark2:       #160E05;
  --border:      rgba(184,134,11,0.35);
  --shadow:      rgba(0,0,0,0.7);
}

* { box-sizing:border-box; margin:0; padding:0; }

html, body {
  height:100%;
  background:var(--dark-bg);
  color:var(--parchment);
  font-family:'IM Fell English',serif;
  overflow-x:hidden;
}

/* ── BACKGROUND TEXTURE ── */
body::before {
  content:'';
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(184,134,11,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 20% 80%, rgba(139,58,15,0.06) 0%, transparent 50%),
    repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,0.003) 3px,rgba(255,255,255,0.003) 4px),
    repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(255,255,255,0.002) 3px,rgba(255,255,255,0.002) 4px);
  pointer-events:none;
}

/* ── HEADER ── */
.site-header {
  position:relative;z-index:10;
  text-align:center;
  padding:52px 24px 36px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(184,134,11,0.06) 0%,transparent 100%);
}
.header-ornament {
  font-size:28px;color:var(--gold);opacity:0.7;
  letter-spacing:12px;margin-bottom:16px;display:block;
}
.site-title {
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(22px,5vw,42px);
  font-weight:700;
  color:var(--gold-bright);
  letter-spacing:3px;
  text-shadow:0 0 40px rgba(240,192,64,0.3), 0 2px 4px rgba(0,0,0,0.8);
  margin-bottom:8px;
}
.site-subtitle {
  font-family:'Cinzel',serif;
  font-size:12px;
  letter-spacing:5px;
  color:rgba(242,232,208,0.5);
  text-transform:uppercase;
  margin-bottom:20px;
}
.header-rule {
  display:flex;align-items:center;gap:16px;justify-content:center;
  margin-top:16px;
}
.header-rule span { height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);flex:1;max-width:200px; }
.header-rule i { color:var(--gold);font-style:normal;font-size:14px; }

/* ── LANG SELECTOR ── */
.lang-bar {
  position:relative;z-index:10;
  display:flex;justify-content:center;align-items:center;gap:8px;
  padding:16px 24px;
  border-bottom:1px solid rgba(184,134,11,0.12);
}
.lang-label {
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;
  color:rgba(242,232,208,0.4);text-transform:uppercase;margin-right:8px;
}
.lang-btn {
  padding:6px 18px;
  border:1px solid rgba(184,134,11,0.3);
  border-radius:2px;
  background:transparent;
  color:rgba(242,232,208,0.5);
  font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;
  cursor:pointer;transition:all .25s;
}
.lang-btn:hover { border-color:var(--gold);color:var(--gold-light);background:rgba(184,134,11,0.08); }
.lang-btn.active { background:rgba(184,134,11,0.15);border-color:var(--gold);color:var(--gold-bright); }

/* ── LAYOUT ── */
.container {
  position:relative;z-index:1;
  max-width:1200px;margin:0 auto;
  padding:40px 24px;
  display:grid;
  grid-template-columns:280px 1fr;
  gap:0;
  min-height:calc(100vh - 200px);
}

/* ── SIDEBAR / BOOK LIST ── */
.sidebar {
  border-right:1px solid var(--border);
  padding-right:0;
}
.sidebar-title {
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;
  color:rgba(242,232,208,0.35);text-transform:uppercase;
  padding:0 24px 16px;
  border-bottom:1px solid rgba(184,134,11,0.1);
  margin-bottom:8px;
}
.book-item {
  display:flex;align-items:center;gap:12px;
  padding:12px 24px;
  cursor:pointer;
  border-left:3px solid transparent;
  transition:all .2s;
  border-bottom:1px solid rgba(184,134,11,0.05);
}
.book-item:hover {
  background:rgba(184,134,11,0.06);
  border-left-color:rgba(184,134,11,0.4);
}
.book-item.active {
  background:rgba(184,134,11,0.12);
  border-left-color:var(--gold);
}
.book-num {
  font-family:'Cinzel',serif;font-size:10px;
  color:rgba(184,134,11,0.4);min-width:20px;
}
.book-item.active .book-num { color:var(--gold-light); }
.book-name {
  font-family:'IM Fell English',serif;font-size:13px;
  color:rgba(242,232,208,0.6);line-height:1.3;
}
.book-item:hover .book-name, .book-item.active .book-name {
  color:var(--parchment);
}

/* ── READER PANEL ── */
.reader {
  padding:0 40px;
}
.reader-header {
  padding-bottom:24px;
  border-bottom:1px solid var(--border);
  margin-bottom:32px;
}
.book-category {
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;
  color:var(--gold);text-transform:uppercase;margin-bottom:10px;display:block;
}
.book-title {
  font-family:'Cinzel',serif;font-size:clamp(20px,3vw,30px);font-weight:600;
  color:var(--parchment);line-height:1.2;margin-bottom:8px;
}
.book-desc {
  font-family:'IM Fell English',serif;font-size:14px;font-style:italic;
  color:rgba(242,232,208,0.5);line-height:1.6;
}

/* ── CHAPTER NAV ── */
.chapter-nav {
  display:flex;flex-wrap:wrap;gap:6px;margin-bottom:28px;
}
.ch-btn {
  padding:5px 14px;
  border:1px solid rgba(184,134,11,0.25);
  border-radius:2px;
  background:transparent;
  color:rgba(242,232,208,0.45);
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;
  cursor:pointer;transition:all .2s;
}
.ch-btn:hover { border-color:var(--gold);color:var(--gold-light);background:rgba(184,134,11,0.08); }
.ch-btn.active { background:rgba(184,134,11,0.18);border-color:var(--gold);color:var(--gold-bright); }

/* ── TRANSLATE CONTROLS ── */
.translate-bar {
  display:flex;align-items:center;gap:12px;margin-bottom:24px;
  padding:12px 16px;
  background:rgba(184,134,11,0.05);
  border:1px solid rgba(184,134,11,0.15);
  border-radius:3px;
}
.translate-label {
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;
  color:rgba(242,232,208,0.35);text-transform:uppercase;flex:1;
}
.translate-btn {
  padding:6px 16px;
  border:1px solid rgba(184,134,11,0.3);border-radius:2px;
  background:transparent;color:rgba(242,232,208,0.55);
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:1.5px;
  cursor:pointer;transition:all .2s;
}
.translate-btn:hover { border-color:var(--gold-light);color:var(--gold-bright);background:rgba(184,134,11,0.1); }
.translate-btn.active { background:rgba(184,134,11,0.2);border-color:var(--gold);color:var(--gold-bright); }

/* ── TEXT AREA ── */
.chapter-content {
  position:relative;
}
.chapter-heading {
  font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;
  color:var(--gold);text-transform:uppercase;margin-bottom:20px;
  display:flex;align-items:center;gap:12px;
}
.chapter-heading::after { content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent); }

.verse {
  display:flex;gap:16px;margin-bottom:14px;line-height:1.8;
}
.verse-num {
  font-family:'Cinzel',serif;font-size:10px;color:var(--gold);
  min-width:24px;padding-top:3px;opacity:0.7;
}
.verse-text {
  font-family:'IM Fell English',serif;font-size:16px;
  color:rgba(242,232,208,0.85);line-height:1.8;
}

/* ── LOADING STATE ── */
.translating-overlay {
  display:none;
  position:absolute;inset:0;
  background:rgba(13,9,4,0.85);
  align-items:center;justify-content:center;flex-direction:column;gap:16px;
  border-radius:4px;z-index:20;
}
.translating-overlay.show { display:flex; }
.loader-cross {
  width:36px;height:36px;position:relative;
}
.loader-cross::before, .loader-cross::after {
  content:'';position:absolute;background:var(--gold);border-radius:2px;
  animation:crossPulse 1.2s ease-in-out infinite;
}
.loader-cross::before { width:4px;height:100%;left:50%;transform:translateX(-50%); }
.loader-cross::after { height:4px;width:100%;top:50%;transform:translateY(-50%);animation-delay:.3s; }
@keyframes crossPulse { 0%,100%{opacity:.3} 50%{opacity:1} }
.loader-text {
  font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;
  color:var(--gold-light);text-transform:uppercase;opacity:0.7;
}

/* ── EMPTY STATE ── */
.empty-state {
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:400px;text-align:center;gap:16px;
}
.empty-ornament { font-size:48px;color:var(--gold);opacity:0.2;line-height:1; }
.empty-title { font-family:'Cinzel',serif;font-size:14px;letter-spacing:3px;color:rgba(242,232,208,0.3); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--dark-bg); }
::-webkit-scrollbar-thumb { background:rgba(184,134,11,0.3);border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:rgba(184,134,11,0.5); }

/* ── MOBILE ── */
@media(max-width:768px) {
  .container { grid-template-columns:1fr;grid-template-rows:auto 1fr; }
  .sidebar { border-right:none;border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:24px; }
  .reader { padding:0; }
  .book-list { display:flex;flex-wrap:wrap;gap:4px;padding:0 24px; }
  .book-item { padding:8px 12px;border-left:none;border-bottom:none;border:1px solid rgba(184,134,11,0.2);border-radius:2px;flex-direction:column;align-items:flex-start;gap:2px; }
  .sidebar-title { padding:0 24px 12px; }
}

/* fade-in */
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.fade-in { animation:fadeIn .4s ease both; }


/* ── STATIC LANGUAGE STATE ── */
.lang-btn.unavailable,
.translate-btn.unavailable,
.lang-btn:disabled,
.translate-btn:disabled {
  opacity:.35;
  cursor:not-allowed;
  border-style:dashed;
}
.lang-status {
  font-family:'Cinzel',serif;
  font-size:9px;
  letter-spacing:1.5px;
  color:rgba(242,232,208,0.35);
  margin-left:4px;
  white-space:nowrap;
}
@media(max-width:768px) {
  .translate-bar { flex-wrap:wrap; }
  .lang-status { width:100%; margin-left:0; margin-top:4px; }
}

</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <span class="header-ornament">✦ ✦ ✦</span>
  <div class="site-title">Biblioteca Apócrifa</div>
  <div class="site-subtitle">Escritos Ocultos das Eras</div>
  <div class="header-rule"><span></span><i>☩</i><span></span></div>
</header>

<!-- LANG BAR -->
<div class="lang-bar">
  <span class="lang-label">Idioma</span>
  <button class="lang-btn active" data-lang="pt" onclick="setGlobalLang('pt',this)">Português</button>
  <button class="lang-btn" data-lang="en" onclick="setGlobalLang('en',this)">English</button>
  <button class="lang-btn" data-lang="es" onclick="setGlobalLang('es',this)">Español</button>
</div>

<!-- MAIN -->
<div class="container">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">Livros</div>
    <div class="book-list" id="bookList"></div>
  </aside>

  <!-- READER -->
  <main class="reader" id="reader">
    <div class="empty-state" id="emptyState">
      <div class="empty-ornament">☩</div>
      <div class="empty-title">Selecione um livro para começar</div>
    </div>
    <div id="readerContent" style="display:none">
      <div class="reader-header">
        <span class="book-category" id="bookCategory"></span>
        <div class="book-title" id="bookTitle"></div>
        <div class="book-desc" id="bookDesc"></div>
      </div>
      <div class="chapter-nav" id="chapterNav"></div>
      <div class="translate-bar">
        <span class="translate-label">Idioma desta seção</span>
        <button class="translate-btn" id="btnPt" onclick="translateChapter('pt')">PT</button>
        <button class="translate-btn active" id="btnEn" onclick="translateChapter('en')">EN</button>
        <button class="translate-btn" id="btnEs" onclick="translateChapter('es')">ES</button>
        <span class="lang-status" id="langStatus"></span>
      </div>
      <div class="chapter-content" id="chapterContent">
        <div class="translating-overlay" id="loadingOverlay">
          <div class="loader-cross"></div>
          <div class="loader-text">Carregando…</div>
        </div>
        <div class="chapter-heading" id="chapterHeading"></div>
        <div id="versesContainer"></div>
      </div>
    </div>
  </main>
</div>

<script src="books-pt.js"></script>
<script src="books-en.js"></script>
<script src="books-es.js"></script>
<script>
// ──────────────────────────────────────────────
// STATIC BOOK DATA — no API calls
// To add translations later, fill books-en.js and books-es.js
// with the same structure and IDs used in books-pt.js.
// ──────────────────────────────────────────────
const LIBRARY = {
  pt: Array.isArray(window.BOOKS_PT) ? window.BOOKS_PT : [],
  en: Array.isArray(window.BOOKS_EN) ? window.BOOKS_EN : [],
  es: Array.isArray(window.BOOKS_ES) ? window.BOOKS_ES : []
};

let BOOKS = LIBRARY.pt;
let currentBook = null;
let currentBookId = null;
let currentChapter = '1';
let currentLang = 'pt';

const LANG_LABELS = {
  pt: 'Português',
  en: 'English',
  es: 'Español'
};

function escapeHTML(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]));
}

function hasLangData(lang) {
  return Array.isArray(LIBRARY[lang]) && LIBRARY[lang].length > 0;
}

function updateLangButtons() {
  const status = document.getElementById('langStatus');
  const unavailable = [];

  document.querySelectorAll('.lang-btn, .translate-btn').forEach(btn => {
    const lang = btn.dataset.lang || btn.textContent.trim().toLowerCase();
    const code = lang === 'pt' ? 'pt' : lang === 'en' ? 'en' : lang === 'es' ? 'es' : null;
    if (!code) return;

    const available = hasLangData(code);
    btn.disabled = !available;
    btn.classList.toggle('unavailable', !available);
    btn.classList.toggle('active', code === currentLang && available);
    btn.title = available ? LANG_LABELS[code] : `${LANG_LABELS[code]} ainda não foi adicionado neste pacote.`;

    if (!available) unavailable.push(LANG_LABELS[code]);
  });

  if (status) {
    if (unavailable.length) {
      status.textContent = `${unavailable.join(' / ')} em preparação`;
    } else {
      status.textContent = `${LANG_LABELS[currentLang]} ativo`;
    }
  }
}

// ──────────────────────────────────────────────
// RENDER BOOK LIST
// ──────────────────────────────────────────────
function renderBookList() {
  const list = document.getElementById('bookList');
  if (!BOOKS.length) {
    list.innerHTML = '<div class="book-item"><span class="book-name">Nenhum livro encontrado.</span></div>';
    return;
  }

  list.innerHTML = BOOKS.map((b, i) => `
    <div class="book-item ${b.id === currentBookId ? 'active' : ''}" id="bi_${escapeHTML(b.id)}" onclick="openBook('${escapeHTML(b.id)}')">
      <span class="book-num">${String(i+1).padStart(2,'0')}</span>
      <span class="book-name">${escapeHTML(b.name)}</span>
    </div>
  `).join('');
}

// ──────────────────────────────────────────────
// OPEN BOOK
// ──────────────────────────────────────────────
function openBook(id, options = {}) {
  currentBook = BOOKS.find(b => b.id === id);
  if (!currentBook) return;
  currentBookId = id;
  if (!options.preserveChapter) currentChapter = '1';
  if (!currentBook.chapters[currentChapter]) currentChapter = Object.keys(currentBook.chapters)[0] || '1';

  document.querySelectorAll('.book-item').forEach(el => el.classList.remove('active'));
  const activeItem = document.getElementById('bi_' + CSS.escape(id));
  if (activeItem) activeItem.classList.add('active');

  document.getElementById('emptyState').style.display = 'none';
  const rc = document.getElementById('readerContent');
  rc.style.display = 'block';
  rc.classList.add('fade-in');
  setTimeout(() => rc.classList.remove('fade-in'), 400);

  document.getElementById('bookCategory').textContent = currentBook.category || '';
  document.getElementById('bookTitle').textContent = currentBook.name || '';
  document.getElementById('bookDesc').textContent = currentBook.desc || '';

  renderChapterNav();
  renderChapter();
  updateLangButtons();
}

// ──────────────────────────────────────────────
// CHAPTER NAV
// ──────────────────────────────────────────────
function renderChapterNav() {
  const chapters = Object.keys(currentBook.chapters).sort((a,b) => Number(a) - Number(b));
  document.getElementById('chapterNav').innerHTML = chapters.map(ch => {
    const navLabel = currentBook.chapterNavLabels?.[ch] || `Parte ${ch}`;
    return `<button class="ch-btn ${String(ch)===String(currentChapter)?'active':''}" onclick="goChapter('${ch}')">${escapeHTML(navLabel)}</button>`;
  }).join('');
}

function goChapter(n) {
  currentChapter = String(n);
  renderChapterNav();
  renderChapter();
}

// ──────────────────────────────────────────────
// RENDER SECTION
// ──────────────────────────────────────────────
function renderChapter() {
  const data = currentBook?.chapters?.[currentChapter];
  if (!data) return;

  const sectionLabel = currentBook.chapterLabels?.[currentChapter] || `Parte ${currentChapter}`;
  document.getElementById('chapterHeading').textContent = sectionLabel;

  document.getElementById('versesContainer').innerHTML = data.map(v => `
    <div class="verse fade-in">
      <span class="verse-num">${escapeHTML(v.n)}</span>
      <span class="verse-text">${escapeHTML(v.text)}</span>
    </div>
  `).join('');

  updateLangButtons();
}

// Kept the function name to preserve the existing button onclick attributes.
// It now switches to a preloaded language file instead of calling an API.
function translateChapter(lang) {
  setGlobalLang(lang);
}

// ──────────────────────────────────────────────
// GLOBAL LANG — static file switch
// ──────────────────────────────────────────────
function setGlobalLang(lang, btn) {
  if (!hasLangData(lang)) {
    alert(`${LANG_LABELS[lang]} ainda não foi adicionado neste pacote. A estrutura já está pronta: basta preencher books-${lang}.js com os textos traduzidos.`);
    updateLangButtons();
    return;
  }

  currentLang = lang;
  BOOKS = LIBRARY[lang];
  renderBookList();

  if (currentBookId) {
    openBook(currentBookId, { preserveChapter: true });
  }

  updateLangButtons();
}

// ── INIT ──
renderBookList();
updateLangButtons();
</script>
</body>
</html>
